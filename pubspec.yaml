name: ai_orchestrator
description: AI-Orchestrator — Professional offline-first project-memory manager with Clean Architecture, multi-platform support and AI API integration.

publish_to: 'none'
version: 1.0.12+12

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.2'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  get_it: ^7.7.0
  dartz: ^0.10.1

  http: ^1.2.1
  dio: ^5.7.0

  package_info_plus: ^8.0.0

  shared_preferences: ^2.3.2
  path_provider: ^2.1.5

  image_picker: ^1.1.2
  file_picker: ^8.3.2
  permission_handler: ^11.3.1

  android_intent_plus: ^6.0.0

  ffi: ^2.1.3

  sherpa_onnx: ^1.10.2
  record: ^5.2.1
  mp_audio_stream: any

  archive: ^3.6.1

  uuid: ^4.4.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/debug_lab/

dependency_overrides:
  record_linux: ^1.1.0
  record_platform_interface: ^1.6.0
