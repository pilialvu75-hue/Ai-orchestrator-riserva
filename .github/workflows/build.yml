name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Ensure llama.cpp submodule
        run: |
          if [ ! -f third_party/llama.cpp/CMakeLists.txt ]; then
            git submodule update --init --recursive
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          yes | sdkmanager --licenses --sdk_root="$ANDROID_SDK_ROOT" > /dev/null

      - name: Create Android signing config
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release-keystore.jks

            {
              echo "storeFile=release-keystore.jks"
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "keyPassword=$ANDROID_KEY_PASSWORD"
            } > android/key.properties

            echo "Release signing configured"
          else
            echo "Secrets missing -> fallback debug signing"
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run Flutter tests
        run: flutter test

      - name: Configure Gradle forensic JVM settings
        shell: bash
        run: |
          mkdir -p ~/.gradle
          {
            echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
            echo "org.gradle.daemon=true"
            echo "org.gradle.parallel=true"
            echo "org.gradle.configureondemand=true"
            echo "org.gradle.workers.max=2"
          } >> ~/.gradle/gradle.properties

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSIONCODE=${VERSIONCODE:-1}
          LATEST_TAG_CODE=$(git tag | grep '^v1\.0\.' | sed 's/v1\.0\.//' | sort -n | tail -1 || true)

          if [ -n "$LATEST_TAG_CODE" ]; then
            VERSION_CODE=$((LATEST_TAG_CODE + 1))
          else
            VERSION_CODE=$VERSIONCODE
          fi

          VERSION_NAME="1.0.$VERSION_CODE"

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Prepare forensic log files
        shell: bash
        run: |
          : > flutter_verbose.log
          : > gradle_stacktrace.log
          : > dependency_tree.log
          : > cmake_diagnostics.log
          : > kotlin_diagnostics.log

      - name: Runner memory and stability baseline
        shell: bash
        run: |
          {
            echo "==== SYSTEM BASELINE ===="
            date -u
            uname -a
            echo
            echo "==== MEMORY ===="
            free -h || true
            echo
            echo "==== DISK ===="
            df -h || true
            echo
            echo "==== JAVA/GRADLE PROCESSES ===="
            ps -eo pid,ppid,cmd,%mem,%cpu --sort=-%mem | head -n 40 || true
          } | tee -a gradle_stacktrace.log

      - name: Build debug APK (Flutter verbose forensic)
        id: flutter_forensic
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --debug --target-platform=android-arm64,android-x64 --build-name=1.0.1 --build-number=1 --verbose 2>&1 | tee flutter_verbose.log

      - name: Build debug APK (Gradle forensic)
        id: gradle_forensic
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          (
            cd android
            ./gradlew assembleDebug --stacktrace --info --warning-mode all
          ) 2>&1 | tee -a gradle_stacktrace.log

      - name: Kotlin diagnostics
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          {
            echo "==== KOTLIN VERSION ===="
            command -v kotlinc &>/dev/null && kotlinc -version 2>&1 || echo "kotlinc not found in PATH"
            echo
            echo "==== KOTLIN GRADLE PLUGIN ===="
            grep -rn -E 'kotlin["\(]|kotlin-gradle-plugin' android/settings.gradle android/build.gradle android/app/build.gradle 2>/dev/null || true
            echo
            echo "==== KOTLIN BUILD ERRORS ===="
            grep -n -E "(error:|warning:|^\s+at )" gradle_stacktrace.log 2>/dev/null | head -n 200 || true
            echo
            echo "==== KOTLIN METADATA ===="
            find . -type f -name '*.kotlin_module' | head -n 20 | sort
          } | tee kotlin_diagnostics.log

      - name: Dependency conflict scan
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          (
            cd android
            ./gradlew :app:dependencies --configuration debugRuntimeClasspath --stacktrace --info --warning-mode all
          ) 2>&1 | tee dependency_tree.log

      - name: Native build diagnostics (CMake/NDK/JNI/.so)
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          {
            echo "==== CMAKE LOGS ===="
            while IFS= read -r f; do
              echo "----- $f -----"
              cat "$f"
              echo
            done < <(find build -type f \( -name 'CMakeError.log' -o -name 'CMakeOutput.log' -o -name 'build_command.txt' -o -name 'configure.log' -o -name 'configure_output.txt' \) 2>/dev/null | sort)
            echo "==== NDK LOGS ===="
            while IFS= read -r f; do
              echo "----- $f -----"
              cat "$f"
              echo
            done < <(find build -type f \( -name '*.ninja_log' -o -name '*.ninja_deps' -o -name 'ninja*.log' \) 2>/dev/null | sort)
            echo "==== JNI / SHARED LIBS INVENTORY ===="
            find . -type f -name '*.so' | sort
            echo
            echo "==== VERIFY KEY LIBRARIES ===="
            find . -type f \( -name 'libllama_bridge.so' -o -iname '*sherpa*onnx*.so' -o -iname '*sherpa*.so' \) | sort
            echo
            echo "==== DUPLICATE .SO NAMES ===="
            find . -type f -name '*.so' -exec basename {} \; | sort | uniq -c | sort -nr | awk '$1>1 {print}'
            echo
            echo "==== ABI PACKAGING (APK) ===="
            if [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
              unzip -l build/app/outputs/flutter-apk/app-debug.apk | grep ' lib/.*\.so$' || true
            else
              echo "APK not generated"
            fi
            echo
            echo "==== VULKAN / OPENCL LINKAGE ===="
            while IFS= read -r so; do
              echo "----- $so -----"
              (readelf -d "$so" 2>/dev/null | grep -Ei 'NEEDED.*(vulkan|opencl|c\\+\\+_shared|c\\+\\+_static)' || true)
            done < <(find . -type f -name '*.so' | sort)
            echo
            echo "==== MISSING SYMBOLS CHECK ===="
            while IFS= read -r so; do
              echo "----- $so -----"
              (readelf -Ws "$so" 2>/dev/null | grep ' UND ' | head -n 200 || true)
            done < <(find . -type f -name '*.so' | sort)
            echo
            echo "==== STRIP TOOL PRESENCE ===="
            command -v llvm-strip || true
            command -v strip || true
          } | tee cmake_diagnostics.log

      - name: NDK/JNI packaging diagnostics
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          {
            echo "==== NDK/JNI DIRECTORIES ===="
            find android/app/src -maxdepth 6 -type d \( -name jniLibs -o -name libs \) -print | sort
            echo
            echo "==== JNILIBS FILES ===="
            find android/app/src -maxdepth 8 -type f -name '*.so' -print | sort
            echo
            echo "==== CXX BUILD TREE ===="
            find build/.cxx -maxdepth 6 -type f 2>/dev/null | sort
          } | tee -a cmake_diagnostics.log

      - name: Runner memory and stability post-build
        if: always()
        shell: bash
        run: |
          {
            echo "==== SYSTEM POST-BUILD ===="
            date -u
            free -h || true
            df -h || true
            ps -eo pid,ppid,cmd,%mem,%cpu --sort=-%mem | head -n 40 || true
          } | tee -a gradle_stacktrace.log

      - name: Print forensic log tails
        if: always()
        shell: bash
        run: |
          echo "==== TAIL gradle_stacktrace.log (last 500 lines) ===="
          if [ -f gradle_stacktrace.log ]; then
            tail -n 500 gradle_stacktrace.log
          else
            echo "gradle_stacktrace.log not found"
          fi
          echo
          echo "==== TAIL flutter_verbose.log (last 300 lines) ===="
          if [ -f flutter_verbose.log ]; then
            tail -n 300 flutter_verbose.log
          else
            echo "flutter_verbose.log not found"
          fi

      - name: Root cause extraction
        if: always()
        shell: bash
        run: |
          echo "==== ROOT CAUSE EXTRACTION ===="
          for log in flutter_verbose.log gradle_stacktrace.log dependency_tree.log cmake_diagnostics.log kotlin_diagnostics.log; do
            if [ -f "$log" ]; then
              echo "--- Searching $log for failure patterns ---"
              grep -n -E "(FAILURE:|Execution failed for task|Caused by:|Exception:|error:)" "$log" | head -n 100 || true
              echo
            fi
          done

      - name: Verify native libraries
        if: always()
        run: |
          if [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            unzip -l build/app/outputs/flutter-apk/app-debug.apk \
              | grep 'lib/arm64-v8a/libllama_bridge.so' \
              || echo "WARNING: libllama_bridge.so not found — native MLC disabled in this build"
          else
            echo "APK not generated; skipping native lib verification"
          fi

      - name: Upload forensic diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-forensics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            flutter_verbose.log
            gradle_stacktrace.log
            dependency_tree.log
            cmake_diagnostics.log
            kotlin_diagnostics.log
            build/.cxx/**/CMakeFiles/CMakeOutput.log
            build/.cxx/**/CMakeFiles/CMakeError.log

      - name: Prepare release assets
        if: steps.flutter_forensic.outcome == 'success' && steps.gradle_forensic.outcome == 'success'
        run: |
          mkdir -p release-assets

          cp build/app/outputs/flutter-apk/app-debug.apk \
             release-assets/AI-Orchestrator-Core-${{ steps.version.outputs.tag }}.apk

      - name: Upload artifact
        if: steps.flutter_forensic.outcome == 'success' && steps.gradle_forensic.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: AI-Orchestrator-Core-${{ steps.version.outputs.tag }}
          path: release-assets/AI-Orchestrator-Core-${{ steps.version.outputs.tag }}.apk

      - name: Generate release notes
        if: steps.flutter_forensic.outcome == 'success' && steps.gradle_forensic.outcome == 'success'
        shell: bash
        run: |
          {
            echo "## AI-Orchestrator-Core"
            echo
            echo "### Included fixes"
            echo
            echo "- Fixed GGUF picker"
            echo "- Improved llama.cpp runtime stability"
            echo "- Increased inference timeout"
            echo "- Improved DeepSeek compatibility"
            echo "- Improved local model loading"
            echo "- Fixed Android signing pipeline"
            echo
            echo "### Commit history"
            echo
            git log --pretty=format:'- %s (%h)' -n 20
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        if: steps.flutter_forensic.outcome == 'success' && steps.gradle_forensic.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AI-Orchestrator-Core ${{ steps.version.outputs.version_name }}
          body_path: RELEASE_NOTES.md
          files: |
            release-assets/AI-Orchestrator-Core-${{ steps.version.outputs.tag }}.apk

      - name: Enforce forensic build success gate
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.flutter_forensic.outcome }}" != "success" || "${{ steps.gradle_forensic.outcome }}" != "success" ]]; then
            echo "Forensic build commands reported failure."
            echo "flutter outcome: ${{ steps.flutter_forensic.outcome }}"
            echo "gradle outcome: ${{ steps.gradle_forensic.outcome }}"
            exit 1
          fi
