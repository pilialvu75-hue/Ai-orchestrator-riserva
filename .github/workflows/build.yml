name: Build & Release APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      TERM: dumb
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
      GRADLE_OPTS: -Dorg.gradle.console=plain -Dorg.gradle.logging.level=info -Dfile.encoding=UTF-8
      SIGNING_DIR: /tmp/android-signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Ensure llama.cpp submodule
        run: |
          if [ ! -f third_party/llama.cpp/CMakeLists.txt ]; then
            git submodule update --init --recursive
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "ndk;26.1.10909125"

      - name: Reset Android debug keystore
        run: |
          mkdir -p ~/.android
          rm -f ~/.android/debug.keystore

          keytool -genkeypair \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "HAS_RELEASE_KEYSTORE=true" >> "$GITHUB_ENV"
            echo "ANDROID_KEYSTORE_BASE64 is configured"

          elif [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "HAS_RELEASE_KEYSTORE=true" >> "$GITHUB_ENV"
            echo "::warning::Using legacy KEYSTORE_BASE64 secret; migrate to ANDROID_KEYSTORE_BASE64."

          else
            echo "HAS_RELEASE_KEYSTORE=false" >> "$GITHUB_ENV"
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"

            echo "::warning::No release keystore configured. Falling back to debug signing."
          fi

          if [ -z "${KEYSTORE_PASSWORD:-}" ]; then
            echo "::warning::KEYSTORE_PASSWORD missing"
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
          fi

          if [ -z "${KEY_ALIAS:-}" ]; then
            echo "::warning::KEY_ALIAS missing"
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
          fi

          if [ -z "${KEY_PASSWORD:-}" ]; then
            echo "::warning::KEY_PASSWORD missing"
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
          fi

      - name: Prepare runtime Android signing files
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          umask 077

          rm -rf "$SIGNING_DIR"
          mkdir -p "$SIGNING_DIR"

          KEYSTORE_PATH="$SIGNING_DIR/release-keystore.jks"

          export KEYSTORE_PATH

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            export EFFECTIVE_KEYSTORE_BASE64="$ANDROID_KEYSTORE_BASE64"
          else
            export EFFECTIVE_KEYSTORE_BASE64="$KEYSTORE_BASE64"
          fi

          python3 - <<'PY'
          import base64
          import os
          import pathlib
          import sys

          raw = os.environ["EFFECTIVE_KEYSTORE_BASE64"]
          path = pathlib.Path(os.environ["KEYSTORE_PATH"])

          try:
              path.write_bytes(base64.b64decode(raw))
          except Exception as exc:
              print(f"::error::Invalid keystore base64: {exc}", file=sys.stderr)
              raise SystemExit(1)
          PY

          if [ ! -s "$KEYSTORE_PATH" ]; then
            echo "::warning::Decoded keystore empty"
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
            rm -f "$KEYSTORE_PATH"
            exit 0
          fi

          echo "decoded_keystore_size_bytes=$(wc -c < "$KEYSTORE_PATH")" | tee keystore_decode.log

          echo "KEYSTORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Audit runtime release keystore
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          : > keystore_validation.log

          if [ -z "${KEYSTORE_FILE:-}" ] || [ ! -s "${KEYSTORE_FILE:-}" ]; then
            echo "Release keystore unavailable" | tee -a keystore_validation.log
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::add-mask::$KEYSTORE_PASSWORD"
          echo "::add-mask::$KEY_PASSWORD"

          if keytool -list -v \
            -keystore "$KEYSTORE_FILE" \
            -storepass:env KEYSTORE_PASSWORD \
            -alias "$KEY_ALIAS" \
            -keypass:env KEY_PASSWORD | tee -a keystore_validation.log; then

            echo "FORCE_DEBUG_RELEASE_SIGNING=false" >> "$GITHUB_ENV"

          else
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"

            echo "::warning::Release keystore validation failed"
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure Android local.properties
        run: |
          set -euo pipefail

          {
            echo "flutter.sdk=$FLUTTER_ROOT"
            echo "sdk.dir=$ANDROID_SDK_ROOT"
          } > android/local.properties

      - name: Validate Gradle wrapper
        run: |
          chmod +x android/gradlew

          (
            cd android
            ./gradlew --version --console=plain
          )

      - name: Flutter analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run Flutter tests
        run: flutter test

      - name: Determine version metadata
        id: version
        run: |
          set -euo pipefail

          APP_VERSION=$(awk -F': *' '$1 == "version" { print $2; exit }' pubspec.yaml)

          if [ -z "$APP_VERSION" ]; then
            echo "::error::version not found in pubspec.yaml"
            exit 1
          fi

          VERSION_NAME="${APP_VERSION%%+*}"

          VERSION_CODE="${GITHUB_RUN_NUMBER}"

          export VERSION_NAME
          export VERSION_CODE

          python3 - <<PY
          from pathlib import Path
          import re
          import os

          version_name = os.environ["VERSION_NAME"]
          version_code = os.environ["VERSION_CODE"]

          path = Path("pubspec.yaml")

          content = path.read_text()

          content = re.sub(
              r"^version:\s*.*$",
              f"version: {version_name}+{version_code}",
              content,
              flags=re.MULTILINE,
          )

          path.write_text(content)
          PY

          TAG="v${VERSION_NAME}+${VERSION_CODE}"

          {
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Generate build README/manual (IT)
        run: |
          set -euo pipefail

          python3 scripts/generate_build_readme_it.py \
            --output BUILD_README_IT.md \
            --version "${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}"

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          flutter build apk \
            --release \
            --target-platform=android-arm64 \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.version_code }}" \
            2>&1 | tee release_apk_build.log

      - name: Build signed release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          flutter build appbundle \
            --release \
            --target-platform=android-arm64 \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.version_code }}" \
            2>&1 | tee release_aab_build.log

      - name: Discover release outputs
        run: |
          set -euo pipefail

          find build/app/outputs -type f \( -name '*.apk' -o -name '*.aab' \) | sort | tee release_outputs.log

      - name: Resolve release asset paths
        id: release_assets
        run: |
          set -euo pipefail

          RELEASE_APK_PATH=""

          for candidate in \
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/app-universal-release.apk; do

            if [ -f "$candidate" ]; then
              RELEASE_APK_PATH="$candidate"
              break
            fi
          done

          RELEASE_AAB_PATH=$(find build/app/outputs -type f -name '*release*.aab' | sort | head -n 1 || true)

          if [ -z "$RELEASE_APK_PATH" ] || [ ! -f "$RELEASE_APK_PATH" ]; then
            echo "::error::Release APK not found"
            exit 1
          fi

          if [ -z "$RELEASE_AAB_PATH" ] || [ ! -f "$RELEASE_AAB_PATH" ]; then
            echo "::error::Release AAB not found"
            exit 1
          fi

          {
            echo "release_apk_path=$RELEASE_APK_PATH"
            echo "release_aab_path=$RELEASE_AAB_PATH"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            release_apk_build.log
            release_aab_build.log
            release_outputs.log
            keystore_decode.log
            keystore_validation.log
            BUILD_README_IT.md

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AI-Orchestrator-android-release-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: |
            ${{ steps.release_assets.outputs.release_apk_path }}
            ${{ steps.release_assets.outputs.release_aab_path }}
            BUILD_README_IT.md

      - name: Generate release notes
        run: |
          {
            echo "## Android release"
            echo
            echo "- Version: ${{ steps.version.outputs.version_name }}"
            echo "- Build number: ${{ steps.version.outputs.version_code }}"
            echo
            echo "### Recent commits"
            echo
            git log --pretty=format:'- %s (%h)' -n 20
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AI-Orchestrator Android ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}
          body_path: RELEASE_NOTES.md
          files: |
            ${{ steps.release_assets.outputs.release_apk_path }}
            ${{ steps.release_assets.outputs.release_aab_path }}
            BUILD_README_IT.md

      - name: Cleanup signing files
        if: always()
        run: |
          rm -rf "$SIGNING_DIR"
          rm -f android/key.properties android/release-keystore.jks
