name: Build & Release APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      TERM: dumb
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
      GRADLE_OPTS: -Dorg.gradle.console=plain -Dorg.gradle.logging.level=info -Dfile.encoding=UTF-8
      SIGNING_DIR: /tmp/android-signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Ensure llama.cpp submodule
        run: |
          if [ ! -f third_party/llama.cpp/CMakeLists.txt ]; then
            git submodule update --init --recursive
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK cmdline-tools v12
        run: |
          set -euo pipefail
          export ANDROID_CUSTOM_CMDLINE="${ANDROID_SDK_ROOT}/cmdline-tools"
          curl -sS https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip -o /tmp/tools.zip
          mkdir -p "$ANDROID_CUSTOM_CMDLINE"
          rm -rf "$ANDROID_CUSTOM_CMDLINE/latest"
          unzip -q /tmp/tools.zip -d /tmp/cmdline-extract
          mv /tmp/cmdline-extract/cmdline-tools "$ANDROID_CUSTOM_CMDLINE/latest"
          rm -rf /tmp/tools.zip /tmp/cmdline-extract

      - name: Install Android NDK
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;28.2.13676358"

      - name: Reset Android debug keystore
        run: |
          mkdir -p ~/.android
          rm -f ~/.android/debug.keystore

          keytool -genkeypair \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "HAS_RELEASE_KEYSTORE=true" >> "$GITHUB_ENV"
            echo "ANDROID_KEYSTORE_BASE64 is configured"

          elif [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "HAS_RELEASE_KEYSTORE=true" >> "$GITHUB_ENV"
            echo "::warning::Using legacy KEYSTORE_BASE64 secret; migrate to ANDROID_KEYSTORE_BASE64."

          else
            echo "HAS_RELEASE_KEYSTORE=false" >> "$GITHUB_ENV"
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"

            echo "::warning::No release keystore configured. Falling back to debug signing."
          fi

          if [ -z "${KEYSTORE_PASSWORD:-}" ]; then
            echo "::warning::KEYSTORE_PASSWORD missing"
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
          fi

          if [ -z "${KEY_ALIAS:-}" ]; then
            echo "::warning::KEY_ALIAS missing"
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
          fi

          if [ -z "${KEY_PASSWORD:-}" ]; then
            echo "::warning::KEY_PASSWORD missing"
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
          fi

      - name: Prepare runtime Android signing files
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          umask 077

          rm -rf "$SIGNING_DIR"
          mkdir -p "$SIGNING_DIR"

          KEYSTORE_PATH="$SIGNING_DIR/release-keystore.jks"

          export KEYSTORE_PATH

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            export EFFECTIVE_KEYSTORE_BASE64="$ANDROID_KEYSTORE_BASE64"
          else
            export EFFECTIVE_KEYSTORE_BASE64="$KEYSTORE_BASE64"
          fi

          python3 - <<'PY'
          import base64
          import os
          import pathlib
          import sys

          raw = os.environ["EFFECTIVE_KEYSTORE_BASE64"]
          path = pathlib.Path(os.environ["KEYSTORE_PATH"])

          try:
              path.write_bytes(base64.b64decode(raw))
          except Exception as exc:
              print(f"::error::Invalid keystore base64: {exc}", file=sys.stderr)
              raise SystemExit(1)
          PY

          if [ ! -s "$KEYSTORE_PATH" ]; then
            echo "::warning::Decoded keystore empty"
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
            rm -f "$KEYSTORE_PATH"
            exit 0
          fi

          echo "decoded_keystore_size_bytes=$(wc -c < "$KEYSTORE_PATH")" | tee keystore_decode.log

          echo "KEYSTORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Audit runtime release keystore
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          : > keystore_validation.log

          if [ -z "${KEYSTORE_FILE:-}" ] || [ ! -s "${KEYSTORE_FILE:-}" ]; then
            echo "Release keystore unavailable" | tee -a keystore_validation.log
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::add-mask::$KEYSTORE_PASSWORD"
          echo "::add-mask::$KEY_PASSWORD"

          if keytool -list -v \
            -keystore "$KEYSTORE_FILE" \
            -storepass:env KEYSTORE_PASSWORD \
            -alias "$KEY_ALIAS" \
            -keypass:env KEY_PASSWORD | tee -a keystore_validation.log; then

            echo "FORCE_DEBUG_RELEASE_SIGNING=false" >> "$GITHUB_ENV"

          else
            echo "FORCE_DEBUG_RELEASE_SIGNING=true" >> "$GITHUB_ENV"

            echo "::warning::Release keystore validation failed"
          fi

      - name: Flutter pub get
       run: flutter pub get

      - name: Debug dependency tree
        run: flutter pub deps --style=compact | grep -E "record|sherpa" || true

      - name: Ensure Android local.propertieses
        run: |
          set -euo pipefail

          {
            echo "flutter.sdk=$FLUTTER_ROOT"
            echo "sdk.dir=$ANDROID_SDK_ROOT"
          } > android/local.properties

      - name: Validate Gradle wrapper
        run: |
          chmod +x android/gradlew

          (
            cd android
            ./gradlew --version --console=plain
          )

      - name: Flutter analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run Flutter tests
        run: flutter test

      - name: Determine version metadata
        id: version
        run: |
          set -euo pipefail

          APP_VERSION=$(awk -F': *' '$1 == "version" { print $2; exit }' pubspec.yaml)

          if [ -z "$APP_VERSION" ]; then
            echo "::error::version not found in pubspec.yaml"
            exit 1
          fi

          VERSION_NAME="${APP_VERSION%%+*}"

          VERSION_CODE="${GITHUB_RUN_NUMBER}"

          export VERSION_NAME
          export VERSION_CODE

          python3 - <<PY
          from pathlib import Path
          import re
          import os

          version_name = os.environ["VERSION_NAME"]
          version_code = os.environ["VERSION_CODE"]

          path = Path("pubspec.yaml")

          content = path.read_text()

          content = re.sub(
              r"^version:\s*.*$",
              f"version: {version_name}+{version_code}",
              content,
              flags=re.MULTILINE,
          )

          path.write_text(content)
          PY

          TAG="v${VERSION_NAME}+${VERSION_CODE}"

          {
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Generate build README/manual (IT)
        run: |
          set -euo pipefail

          python3 scripts/generate_build_readme_it.py \
            --output BUILD_README_IT.md \
            --version "${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}"

      - name: Force clean Android native rebuild
        run: |
          set -euo pipefail

          flutter clean
          rm -rf android/.cxx
          rm -rf android/build
          rm -rf build
          rm -rf android/app/build/intermediates

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          flutter build apk \
            --release \
            --target-platform=android-arm64 \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.version_code }}" \
            2>&1 | tee release_apk_build.log

      - name: Build signed release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          flutter build appbundle \
            --release \
            --target-platform=android-arm64 \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.version_code }}" \
            2>&1 | tee release_aab_build.log

      - name: Discover release outputs
        run: |
          set -euo pipefail

          find build/app/outputs -type f \( -name '*.apk' -o -name '*.aab' \) | sort | tee release_outputs.log

      - name: Resolve release asset paths
        id: release_assets
        run: |
          set -euo pipefail

          RELEASE_APK_PATH=""

          for candidate in \
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/app-universal-release.apk; do

            if [ -f "$candidate" ]; then
              RELEASE_APK_PATH="$candidate"
              break
            fi
          done

          RELEASE_AAB_PATH=$(find build/app/outputs -type f -name '*release*.aab' | sort | head -n 1 || true)

          if [ -z "$RELEASE_APK_PATH" ] || [ ! -f "$RELEASE_APK_PATH" ]; then
            echo "::error::Release APK not found"
            exit 1
          fi

          if [ -z "$RELEASE_AAB_PATH" ] || [ ! -f "$RELEASE_AAB_PATH" ]; then
            echo "::error::Release AAB not found"
            exit 1
          fi

          {
            echo "release_apk_path=$RELEASE_APK_PATH"
            echo "release_aab_path=$RELEASE_AAB_PATH"
          } >> "$GITHUB_OUTPUT"

      - name: Verify packaged RuntimeSession bridge ABI in APK
        run: |
          set -euo pipefail

          RELEASE_APK_PATH="${{ steps.release_assets.outputs.release_apk_path }}"
          EXTRACT_DIR="/tmp/apk-lib-verify"
          rm -rf "$EXTRACT_DIR"
          mkdir -p "$EXTRACT_DIR"

          unzip -o "$RELEASE_APK_PATH" "lib/*/libllama_bridge.so" -d "$EXTRACT_DIR" >/dev/null

          SO_PATH=$(find "$EXTRACT_DIR" -type f -name "libllama_bridge.so" | sort | head -n 1 || true)
          if [ -z "$SO_PATH" ] || [ ! -f "$SO_PATH" ]; then
            echo "::error::libllama_bridge.so not found in packaged APK"
            exit 1
          fi

          REQUIRED_SYMBOLS_PATTERN="llb_create_session|llb_session_start_gen|llb_session_poll_token"
          LEGACY_SYMBOLS_PATTERN="llb_load_model|llb_start_gen|llb_poll_token|llb_cancel|llb_free_model|llb_is_loaded"

          echo "inspected_so=$SO_PATH" | tee runtime_bridge_package_summary.log

          # Verify native RuntimeSession lifecycle tags emitted by native/android/llama_bridge.cpp.
          strings "$SO_PATH" | grep -nE "SESSION_CREATE_BEGIN|THREAD_START|THREAD_FIRST_TOKEN" | tee runtime_bridge_package_tags.log || true
          if [ ! -s runtime_bridge_package_tags.log ]; then
            echo "::error::required RuntimeSession log tags not found in packaged libllama_bridge.so"
            exit 1
          fi

          readelf -Ws "$SO_PATH" | grep -nE "$REQUIRED_SYMBOLS_PATTERN" | tee runtime_bridge_exports_required.log || true
          for symbol in llb_create_session llb_session_start_gen llb_session_poll_token; do
            if ! grep -q "$symbol" runtime_bridge_exports_required.log; then
              echo "::error::required RuntimeSession symbol missing from packaged libllama_bridge.so: $symbol"
              exit 1
            fi
          done

          LEGACY_EXPORTS=""
          for symbol in llb_load_model llb_start_gen llb_poll_token llb_cancel llb_free_model llb_is_loaded; do
            MATCH=$(readelf -Ws "$SO_PATH" | grep -n -w "$symbol" || true)
            if [ -n "$MATCH" ]; then
              LEGACY_EXPORTS="${LEGACY_EXPORTS}${MATCH}"$'\n'
            fi
          done
          printf '%s\n' "$LEGACY_EXPORTS" | tee runtime_bridge_exports_legacy.log >/dev/null
          if [ -n "$LEGACY_EXPORTS" ]; then
            echo "::error::legacy global bridge exports found in packaged APK"
            exit 1
          fi

          # Diagnostic-only logs for artifact inspection after validation has passed.
          nm -D --defined-only "$SO_PATH" | grep -nE "$REQUIRED_SYMBOLS_PATTERN|$LEGACY_SYMBOLS_PATTERN" | tee runtime_bridge_nm_exports.log || true

      - name: Upload release diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            release_apk_build.log
            release_aab_build.log
            release_outputs.log
            keystore_decode.log
            keystore_validation.log
            BUILD_README_IT.md
            runtime_bridge_package_summary.log
            runtime_bridge_package_tags.log
            runtime_bridge_exports_required.log
            runtime_bridge_exports_legacy.log
            runtime_bridge_nm_exports.log

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AI-Orchestrator-android-release-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: |
            ${{ steps.release_assets.outputs.release_apk_path }}
            ${{ steps.release_assets.outputs.release_aab_path }}
            BUILD_README_IT.md

      - name: Generate release notes
        run: |
          {
            echo "## Android release"
            echo
            echo "- Version: ${{ steps.version.outputs.version_name }}"
            echo "- Build number: ${{ steps.version.outputs.version_code }}"
            echo
            echo "### Recent commits"
            echo
            git log --pretty=format:'- %s (%h)' -n 20
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AI-Orchestrator Android ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}
          body_path: RELEASE_NOTES.md
          files: |
            ${{ steps.release_assets.outputs.release_apk_path }}
            ${{ steps.release_assets.outputs.release_aab_path }}
            BUILD_README_IT.md

      - name: Cleanup signing files
        if: always()
        run: |
          rm -rf "$SIGNING_DIR"
          rm -f android/key.properties android/release-keystore.jks
