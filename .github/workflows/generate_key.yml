name: Generate New Keystore
on: workflow_dispatch # Si avvia solo quando premi tu il tasto

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Key
        run: |
          keytool -genkey -v -keystore release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias my-key-alias \
            -storepass PASSWORD_TEMPORANEA \
            -keypass PASSWORD_TEMPORANEA \
            -dname "CN=AI Orchestrator, O=Android, C=IT"
          
          echo "COPIA LA STRINGA QUI SOTTO:"
          base64 -w 0 release.jks
          echo ""
          echo "FINE STRINGA"
