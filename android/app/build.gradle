import java.util.Locale

plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) }
}

def keystoreProperties = new Properties()
def keystorePropertiesPath = System.getenv("ANDROID_KEY_PROPERTIES_FILE")
def keystorePropertiesFile = keystorePropertiesPath ? file(keystorePropertiesPath) : rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"
// Primary Android target ABI.
def supportedAndroidAbis = ["arm64-v8a"]
def supportedFlutterTargetPlatforms = ["android-arm64"]
def safeFlutterVersionCode
try {
    safeFlutterVersionCode = Integer.parseInt(flutterVersionCode)
} catch (NumberFormatException ignored) {
    safeFlutterVersionCode = 1
}

def requestedTargetPlatformsRaw = (
    project.findProperty("target-platform")
        ?: localProperties.getProperty("target-platform")
        ?: localProperties.getProperty("flutter.target-platform")
        ?: localProperties.getProperty("flutter.targetPlatform")
        ?: supportedFlutterTargetPlatforms.join(",")
).toString()
def requestedTargetPlatforms = requestedTargetPlatformsRaw
    .split(",")
    .collect { it.trim() }
    .findAll { !it.isEmpty() }
def requestedGradleTasks = gradle.startParameter.taskNames.collect { it.toLowerCase(Locale.ROOT) }
def requiresReleaseSigning = requestedGradleTasks.any { taskName ->
    taskName.contains("release") || taskName.contains("bundle") || taskName.contains("publish")
}
def unsupportedTargetPlatforms = requestedTargetPlatforms.findAll {
    !supportedFlutterTargetPlatforms.contains(it)
}
if (!unsupportedTargetPlatforms.isEmpty()) {
    throw new GradleException(
        "Unsupported Flutter target platform(s): ${unsupportedTargetPlatforms}. " +
        "Only 64-bit targets are allowed: ${supportedFlutterTargetPlatforms}"
    )
}

android {
    namespace "com.aiorchestrator"
    compileSdk 34
    ndkVersion "26.1.10909125"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.aiorchestrator"
        minSdk 24
        targetSdk 34
        versionCode safeFlutterVersionCode
        versionName flutterVersionName
        buildConfigField "boolean", "ANDROID_NATIVE_MLC_ENABLED", "false"

        externalNativeBuild {
            cmake {
                abiFilters(*supportedAndroidAbis)
                cppFlags "-std=c++17 -O3 -fno-finite-math-only -DNDEBUG"
                arguments(
                    "-DAI_ANDROID_ENABLE_MLC=OFF",
                    // Disable OpenMP to prevent libomp.so from being bundled
                    // into the APK. libomp.so (LLVM OpenMP runtime) is not a
                    // standard Android system library and causes "App not
                    // installed" / "Package invalid" errors on Samsung devices.
                    "-DGGML_OPENMP=OFF"
                )
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file("${System.properties['user.home']}/.android/debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            def storeFilePath = keystoreProperties.getProperty("storeFile") ?: System.getenv("KEYSTORE_FILE")
            def storePasswordValue = keystoreProperties.getProperty("storePassword") ?: System.getenv("KEYSTORE_PASSWORD")
            def keyAliasValue = keystoreProperties.getProperty("keyAlias") ?: System.getenv("KEY_ALIAS")
            def keyPasswordValue = keystoreProperties.getProperty("keyPassword") ?: System.getenv("KEY_PASSWORD")
            def storeFileCandidate = storeFilePath ? file(storeFilePath) : null

            if (storeFileCandidate != null && storeFileCandidate.exists() && storePasswordValue != null && keyAliasValue != null && keyPasswordValue != null) {
                storeFile storeFileCandidate
                storePassword storePasswordValue
                keyAlias keyAliasValue
                keyPassword keyPasswordValue
            } else if (requiresReleaseSigning) {
                throw new GradleException(
                    "Missing Android release signing configuration. " +
                    "Provide KEYSTORE_FILE, KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD " +
                    "or a valid key.properties/ANDROID_KEY_PROPERTIES_FILE before running release tasks."
                )
            } else {
                initWith signingConfigs.debug
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "../../native/android/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        debug {
            // Explicit debug signing via the auto-generated debug.keystore so the
            // APK is always signed and installable on physical devices.
            signingConfig signingConfigs.debug
            // Suffix isolates the debug package from any existing release install,
            // eliminating "INSTALL_FAILED_UPDATE_INCOMPATIBLE" signature conflicts.
            applicationIdSuffix ".debug"
            debuggable true
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }

    // ABI splits — generates arm64-specific and universal APK outputs.
    splits {
        abi {
            enable true
            reset()
            include "arm64-v8a"
            universalApk true
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
            excludes += [
                "**/x86/**"
            ]
        }
    }

}

flutter {
    source "../.."
}
