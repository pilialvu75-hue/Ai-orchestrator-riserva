import java.util.Locale

plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) }
}

def keystoreProperties = new Properties()
def keystorePropertiesPath = System.getenv("ANDROID_KEY_PROPERTIES_FILE")
def keystorePropertiesFile = keystorePropertiesPath ? file(keystorePropertiesPath) : rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"
// Primary Android target ABI.
def supportedAndroidAbis = ["arm64-v8a"]
def supportedFlutterTargetPlatforms = ["android-arm64"]
def safeFlutterVersionCode
try {
    safeFlutterVersionCode = Integer.parseInt(flutterVersionCode)
} catch (NumberFormatException ignored) {
    safeFlutterVersionCode = 1
}

def requestedTargetPlatformsRaw = (
    project.findProperty("target-platform")
        ?: localProperties.getProperty("target-platform")
        ?: localProperties.getProperty("flutter.target-platform")
        ?: localProperties.getProperty("flutter.targetPlatform")
        ?: supportedFlutterTargetPlatforms.join(",")
).toString()
def requestedTargetPlatforms = requestedTargetPlatformsRaw
    .split(",")
    .collect { it.trim() }
    .findAll { !it.isEmpty() }
def requestedGradleTasks = gradle.startParameter.taskNames.collect { it.toLowerCase(Locale.ROOT) }
def forceDebugReleaseSigning = (
    project.findProperty("forceDebugReleaseSigning")
        ?: System.getenv("FORCE_DEBUG_RELEASE_SIGNING")
        ?: "false"
).toString().toBoolean()
def alignDebugReleaseSigning = (
    project.findProperty("alignDebugReleaseSigning")
        ?: System.getenv("ALIGN_DEBUG_RELEASE_SIGNING")
        ?: "false"
).toString().toBoolean()
def requiresReleaseSigning = requestedGradleTasks.any { taskName ->
    taskName.contains("assemblerelease")
        || taskName.contains("bundlerelease")
        || taskName.contains("packagerelease")
        || (taskName.contains("publish") && taskName.contains("release"))
}
def releaseStoreFilePath = keystoreProperties.getProperty("storeFile") ?: System.getenv("KEYSTORE_FILE")
def releaseStorePasswordValue = keystoreProperties.getProperty("storePassword") ?: System.getenv("KEYSTORE_PASSWORD")
def releaseKeyAliasValue = keystoreProperties.getProperty("keyAlias") ?: System.getenv("KEY_ALIAS")
def releaseKeyPasswordValue = keystoreProperties.getProperty("keyPassword") ?: System.getenv("KEY_PASSWORD")
def releaseStoreFileCandidate = releaseStoreFilePath ? file(releaseStoreFilePath) : null
def hasReleaseSigningMaterial = releaseStoreFileCandidate != null &&
    releaseStoreFileCandidate.exists() &&
    releaseStorePasswordValue != null &&
    releaseKeyAliasValue != null &&
    releaseKeyPasswordValue != null
def useReleaseSigningForDebug = alignDebugReleaseSigning && hasReleaseSigningMaterial
if (useReleaseSigningForDebug) {
    println("⚠ alignDebugReleaseSigning enabled: debug builds will use release signing and package identity for OTA local testing.")
}
def unsupportedTargetPlatforms = requestedTargetPlatforms.findAll {
    !supportedFlutterTargetPlatforms.contains(it)
}
if (!unsupportedTargetPlatforms.isEmpty()) {
    throw new GradleException(
        "Unsupported Flutter target platform(s): ${unsupportedTargetPlatforms}. " +
        "Only 64-bit targets are allowed: ${supportedFlutterTargetPlatforms}"
    )
}

android {
    namespace "com.aiorchestrator"
    compileSdk 34
    ndkVersion "26.1.10909125"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.aiorchestrator"
        minSdk 24
        targetSdk 34
        versionCode safeFlutterVersionCode
        versionName flutterVersionName
        buildConfigField "boolean", "ANDROID_NATIVE_MLC_ENABLED", "false"

        externalNativeBuild {
            cmake {
                abiFilters(*supportedAndroidAbis)
                cppFlags "-std=c++17 -O3 -fno-finite-math-only -DNDEBUG"
                arguments(
                    "-DAI_ANDROID_ENABLE_MLC=OFF",
                    // Disable OpenMP to prevent libomp.so from being bundled
                    // into the APK. libomp.so (LLVM OpenMP runtime) is not a
                    // standard Android system library and causes "App not
                    // installed" / "Package invalid" errors on Samsung devices.
                    "-DGGML_OPENMP=OFF"
                )
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file("${System.properties['user.home']}/.android/debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            if (hasReleaseSigningMaterial) {
                storeFile releaseStoreFileCandidate
                storePassword releaseStorePasswordValue
                keyAlias releaseKeyAliasValue
                keyPassword releaseKeyPasswordValue
            } else if (requiresReleaseSigning) {
                throw new GradleException(
                    "Missing Android release signing configuration. " +
                    "Provide KEYSTORE_FILE, KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD " +
                    "or a valid key.properties/ANDROID_KEY_PROPERTIES_FILE before running release tasks."
                )
            } else {
                initWith signingConfigs.debug
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "../../native/android/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        debug {
            // Default: keep isolated debug package signed with debug key.
            // Optional OTA local test mode: align debug with release signing/package
            // (`-PalignDebugReleaseSigning=true` or `ALIGN_DEBUG_RELEASE_SIGNING=true`)
            // so local OTA signatures match server-provided APK lineage.
            // If release signing credentials are unavailable locally, fallback to
            // standard debug signing and debug package suffix.
            signingConfig useReleaseSigningForDebug ? signingConfigs.release : signingConfigs.debug
            if (!useReleaseSigningForDebug) {
                // Suffix isolates the debug package from release installs.
                applicationIdSuffix ".debug"
            }
            debuggable true
        }
        release {
            signingConfig forceDebugReleaseSigning ? signingConfigs.debug : signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }


}

flutter {
    source "../.."
}
